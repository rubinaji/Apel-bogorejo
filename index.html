<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pengumuman Digital - Puskesmas Bogorejo</title>
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #0d9488;
            --primary-dark: #0f766e;
            --accent-color: #14b8a6;
            --bg-color: #f0fdf4;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --shadow: 0 10px 25px -5px rgba(13, 148, 136, 0.15), 0 8px 10px -6px rgba(13, 148, 136, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #e2e8f0;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        /* Android Phone Frame Wrapper */
        .phone-frame {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            max-height: 850px;
            background-color: var(--bg-color);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            border: 8px solid #1e293b;
        }

        @media (max-width: 480px) {
            body {
                padding: 0;
            }
            .phone-frame {
                max-width: 100%;
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
                border: none;
            }
        }

        /* Status Bar ala HP */
        .status-bar {
            background-color: var(--primary-dark);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            font-weight: 500;
        }

        /* Header Aplikasi */
        .app-header {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .app-header h1 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .app-header p {
            font-size: 12px;
            opacity: 0.9;
        }

        /* Main Scrollable Content */
        .app-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 80px;
        }

        /* Card Modern */
        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        /* Jam & Tanggal Card */
        .clock-card .time {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary-dark);
            letter-spacing: 1px;
        }

        .clock-card .date {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Action Buttons */
        .btn-action {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 16px;
            padding: 15px;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(13, 148, 136, 0.3);
            transition: all 0.2s ease;
        }

        .btn-action:active {
            transform: scale(0.97);
        }

        .btn-action.secondary {
            background: linear-gradient(135deg, #0284c7, #0369a1);
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.3);
        }

        .btn-action.danger {
            background: linear-gradient(135deg, #475569, #334155);
            box-shadow: 0 4px 12px rgba(71, 85, 105, 0.3);
        }

        /* Status Sistem Card */
        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            background-color: #d1fae5;
            color: #065f46;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        /* Bottom Navigation Bar */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: white;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.08);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            z-index: 10;
        }

        .nav-item {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-item i {
            font-size: 18px;
        }

        .nav-item.active, .nav-item:hover {
            color: var(--primary-color);
        }

        /* Modal Popup Pengaturan */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: white;
            width: 100%;
            max-height: 80vh;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            padding: 25px;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .modal-overlay.show .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
        }

        .btn-save {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="phone-frame">
        <!-- Status Bar -->
        <div class="status-bar">
            <span>Puskesmas Bogorejo</span>
            <span id="statusBarTime">07:25</span>
        </div>

        <!-- Header -->
        <div class="app-header">
            <h1>Sistem Pengumuman Digital</h1>
            <p>Puskesmas Bogorejo</p>
        </div>

        <!-- Content Area -->
        <div class="app-content">
            <!-- Jam Digital Card -->
            <div class="card clock-card">
                <div class="time" id="liveTime">00:00:00</div>
                <div class="date" id="liveDate">Memuat tanggal...</div>
            </div>

            <!-- Tombol Aksi Utama -->
            <button class="btn-action secondary" onclick="playAudio('pembukaan')">
                <i class="fa-solid fa-music"></i> 🎵 Musik Pembukaan
            </button>

            <button class="btn-action" onclick="jalankanPengumumanFull()">
                <i class="fa-solid fa-bullhorn"></i> 📢 Mulai Pengumuman
            </button>

            <button class="btn-action danger" onclick="playAudio('penutup')">
                <i class="fa-solid fa-flag-checkered"></i> 🎵 Musik Penutup
            </button>

            <!-- Status Sistem Card -->
            <div class="card">
                <div style="font-size: 13px; color: var(--text-muted); margin-bottom: 6px;">Status Sistem</div>
                <div class="status-badge" id="systemStatus">Siap Digunakan</div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" onclick="switchTab('beranda')">
                <i class="fa-solid fa-house"></i>
                <span>Beranda</span>
            </button>
            <button class="nav-item" onclick="switchTab('audio')">
                <i class="fa-solid fa-volume-high"></i>
                <span>Audio</span>
            </button>
            <button class="nav-item" onclick="toggleModal(true)">
                <i class="fa-solid fa-gear"></i>
                <span>Pengaturan</span>
            </button>
        </nav>

        <!-- Modal Pengaturan -->
        <div class="modal-overlay" id="settingsModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>⚙️ Pengaturan Sistem</h3>
                    <button class="close-modal" onclick="toggleModal(false)"><i class="fa-solid fa-xmark"></i></button>
                </div>
                
                <div class="form-group">
                    <label>Durasi Musik Pembukaan (detik)</label>
                    <input type="number" id="durasiPembukaan" value="5">
                </div>

                <div class="form-group">
                    <label>Durasi Musik Penutup (detik)</label>
                    <input type="number" id="durasiPenutup" value="5">
                </div>

                <div class="form-group">
                    <label>Kecepatan Suara AI</label>
                    <select id="speechRate">
                        <option value="0.9">Lambat (0.9)</option>
                        <option value="1.0" selected>Normal (1.0)</option>
                        <option value="1.1">Cepat (1.1)</option>
                    </select>
                </div>

                <button class="btn-save" onclick="simpanPengaturan()">Simpan Pengaturan</button>
            </div>
        </div>
    </div>

    <!-- Elemen Audio Tersembunyi -->
    <audio id="audioPembukaan" src="audio/pembukaan.mp3"></audio>
    <audio id="audioPenutup" src="audio/penutup.mp3"></audio>

    <script>
        // Update Jam & Tanggal Live
        function updateClock() {
            const now = new Date();
            
            // Format Jam
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('liveTime').innerText = `${hours}:${minutes}:${seconds}`;
            document.getElementById('statusBarTime').innerText = `${hours}:${minutes}`;

            // Format Tanggal Indonesia
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('liveDate').innerText = now.toLocaleDateString('id-ID', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Modal Handler
        function toggleModal(show) {
            const modal = document.getElementById('settingsModal');
            if (show) {
                modal.classList.add('show');
            } else {
                modal.classList.remove('show');
            }
        }

        // Tab Navigation Dummy Handler
        function switchTab(tabName) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            if(tabName === 'audio') {
                toggleModal(true);
            }
        }

        // Fungsi Putar Audio
        function playAudio(type) {
            const audio = type === 'pembukaan' ? document.getElementById('audioPembukaan') : document.getElementById('audioPenutup');
            const status = document.getElementById('systemStatus');
            
            status.innerText = `Memutar ${type}...`;
            audio.currentTime = 0;
            audio.play().catch(e => {
                alert("File audio/pembukaan.mp3 atau audio/penutup.mp3 belum tersedia di folder /audio.");
                status.innerText = "Error: File Audio Tidak Ditemukan";
            });

            audio.onended = () => {
                status.innerText = "Siap Digunakan";
            };
        }

        // Fungsi Otomatis Pengumuman Lengkap (Musik -> Suara Jam -> Musik Penutup)
        function jalankanPengumumanFull() {
            const status = document.getElementById('systemStatus');
            const durPembukaan = (parseInt(document.getElementById('durasiPembukaan').value) || 5) * 1000;
            
            status.innerText = "Memutar Musik Pembukaan...";
            const audioPembukaan = document.getElementById('audioPembukaan');
            audioPembukaan.currentTime = 0;
            audioPembukaan.play().catch(() => {});

            // Setelah durasi musik pembukaan selesai, jalankan TTS Jam Otomatis
            setTimeout(() => {
                audioPembukaan.pause();
                
                status.innerText = "Membaca Pengumuman Jam...";
                
                const now = new Date();
                const jam = now.getHours();
                const menit = now.getMinutes();
                
                // Terjemahan waktu sederhana ke teks bahasa Indonesia
                let teksWaktu = `Perhatian kepada seluruh pegawai, saat ini waktu menunjukkan pukul ${jam} lewat ${menit} menit Waktu Indonesia Barat. Demikian pengumuman ini disampaikan, terima kasih.`;

                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(teksWaktu);
                    utterance.lang = 'id-ID';
                    utterance.rate = parseFloat(document.getElementById('speechRate').value) || 1.0;
                    
                    utterance.onend = () => {
                        status.innerText = "Siap Digunakan";
                    };
                    
                    window.speechSynthesis.speak(utterance);
                } else {
                    alert("Browser Anda tidak mendukung fitur Suara Otomatis (Speech Synthesis).");
                    status.innerText = "Siap Digunakan";
                }

            }, durPembukaan);
        }

        function simpanPengaturan() {
            toggleModal(false);
            alert("Pengaturan berhasil disimpan!");
        }
    </script>
</body>
</html>
